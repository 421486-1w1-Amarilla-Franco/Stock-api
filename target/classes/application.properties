# ========================
# Base de datos SQL Server
# ========================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=stock_db;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=stockuser
spring.datasource.password=Stock@1234

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ========================
# JWT
# ========================
jwt.secret=cambia_esta_clave_secreta_por_una_muy_larga_y_segura_en_produccion
jwt.expiration=86400000

# ========================
# Swagger
# ========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ========================
# Server
# ========================
server.port=8080
spring.application.name=stock-api
